<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FlyAway | Payment Successful</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:black;
    color:chartreuse;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}


.confirm-box{
    width:550px;
    padding:40px;
    border-radius:25px;
    background:rgba(155,220,89,0.12);
    border:2px solid chartreuse;
    text-align:center;
    animation: popUp 0.8s ease-out forwards;
}


.check{
    width:90px;
    height:90px;
    border-radius:50%;
    border:4px solid chartreuse;
    margin:0 auto 20px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:55px;
    animation: drawCircle 0.8s ease-out forwards;
}


h1{
    opacity:0;
    animation: fadeIn 1s ease forwards;
    animation-delay:0.6s;
}

p{
    opacity:0;
    animation: fadeIn 1s ease forwards;
    animation-delay:0.9s;
}


.ticket{
    margin-top:25px;
    padding:18px;
    border:1px dashed chartreuse;
    border-radius:15px;
    text-align:left;
    opacity:0;
    animation: slideUp 1s ease forwards;
    animation-delay:1.2s;
}

.ticket p{
    font-size:14px;
    margin:6px 0;
}


.btn{
    display:inline-block;
    margin-top:30px;
    padding:12px 30px;
    background:chartreuse;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    opacity:0;
    animation: fadeIn 1s ease forwards;
    animation-delay:1.6s;
}

.btn:hover{
    box-shadow:0 0 15px chartreuse;
}


@keyframes popUp{
    from{ transform:scale(0.6); opacity:0 }
    to{ transform:scale(1); opacity:1 }
}

@keyframes drawCircle{
    from{ transform:scale(0); }
    to{ transform:scale(1); }
}

@keyframes fadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
}

@keyframes slideUp{
    from{ transform:translateY(30px); opacity:0 }
    to{ transform:translateY(0); opacity:1 }
}
</style>
</head>

<body>

<div class="confirm-box">

    <div class="check">✔</div>

    <h1>Payment Successful!</h1>
    <p>Your booking has been confirmed ✈️</p>

</div>
</body></html>
