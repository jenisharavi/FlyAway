<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | FlyAway</title>

<style>
* {
  box-sizing: border-box;
}


body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
}


.navbar {
  width: 100%;
  padding: 20px 60px;
  background: black;
  display: flex;
  justify-content: flex-end;
  gap: 20px;
  border-bottom: 2px solid chartreuse;
}

.navbar a {
  padding: 8px 18px;
  border: 2px solid chartreuse;
  color: chartreuse;
  text-decoration: none;
  border-radius: 4px;
  transition: 0.3s;
}

.navbar a:hover {
  background: chartreuse;
  color: black;
}


.contact-banner {
  height: 55vh;
  margin: 30px;
  border-radius: 35px;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;

  background: linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
  url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d") center/cover;

  animation: fadeIn 1.2s ease;
}

.contact-banner h1 {
  font-size: 55px;
  color: chartreuse;
  letter-spacing: 4px;
}

.contact-banner p {
  font-size: 22px;
  opacity: 0.9;
}


.section {
  width: 80%;
  margin: auto;
  margin-top: 60px;
  animation: fadeUp 1s;
}

.section h2 {
  font-size: 38px;
  color: chartreuse;
  margin-bottom: 15px;
}


.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}


.info-box {
  background: rgba(170, 255, 70, 0.08);
  padding: 30px;
  border-radius: 25px;
  border: 1px solid chartreuse;
}

.info-box p {
  font-size: 18px;
  margin: 15px 0;
}


.form-box {
  background: rgba(170, 255, 70, 0.08);
  padding: 30px;
  border-radius: 25px;
  border: 1px solid chartreuse;
}

.form-box input,
.form-box textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 15px;
}

.form-box textarea {
  resize: none;
  height: 120px;
}

.form-box button {
  width: 100%;
  padding: 12px;
  background: chartreuse;
  color: black;
  border: none;
  border-radius: 8px;
  font-size: 18px;
  cursor: pointer;
}

.form-box button:hover {
  background: white;
}


.footer {
  background: chartreuse;
  color: black;
  text-align: center;
  padding: 20px;
  margin-top: 60px;
  font-weight: bold;
}


@keyframes fadeIn {
  from { opacity: 0; transform: scale(1.05); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}


@media (max-width: 900px) {
  .contact-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>


<header class="navbar">
  <a href="home.html">Home</a>
  <a href="about.html">About Us</a>
  <a href="gallary.html">Gallery</a>
</header>


<div class="contact-banner">
  <h1>Contact Us</h1>
  <p>We’d love to hear from you</p>
</div>


<div class="section">
  <h2>Get In Touch</h2>

  <div class="contact-grid">

    
    <div class="info-box">
      <p>📍 <strong>Office:</strong> FlyAway Travel, Global Tours</p>
      <p>📧 <strong>Email:</strong> support@flyaway.com</p>
      <p>📞 <strong>Phone:</strong> +91 98765 43210</p>
      <p>⏰ <strong>Support:</strong> 24/7 Customer Assistance</p>
    </div>

    
    <div class="form-box">
      <input type="text" placeholder="Your Name">
      <input type="email" placeholder="Your Email">
      <textarea placeholder="Your Message"></textarea>
      <button>Send Message</button>
    </div>

  </div>
</div>


<div class="footer">
  © 2025 FlyAway Travel. All Rights Reserved.
</div>

</body>
</html>
