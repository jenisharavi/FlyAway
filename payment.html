<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment</title>

<style>
*{
  box-sizing:border-box;
}

body{
    background:black;
    color:white;
    font-family:Arial;
    margin:0;
}


.navbar {
  width: 100%;
  padding: 20px 60px;
  background: black;
  display: flex;
  justify-content: flex-end;
  gap: 20px;
  border-bottom: 2px solid chartreuse;
}

.navbar a {
  padding: 8px 18px;
  border: 2px solid chartreuse;
  color: chartreuse;
  text-decoration: none;
  border-radius: 4px;
  transition: 0.3s;
}

.navbar a:hover {
  background: chartreuse;
  color: black;
}


.box{
    width:400px;
    margin:70px auto;
    background:rgba(155,220,89,0.12);
    padding:30px;
    border-radius:25px;
    border:2px solid chartreuse;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    outline:none;
}

.btn{
    background:chartreuse;
    padding:10px;
    width:100%;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:white;
}
</style>
</head>

<body>


<header class="navbar">
  <a href="home.html">Home</a>
  <a href="about.html">About Us</a>
  <a href="contact.html">Contact Us</a>
</header>


<div class="box">
  <h2 style="color:chartreuse; text-align:center;">Payment Details</h2>

  <input placeholder="Card Number">
  <input placeholder="Expiry Date">
  <input placeholder="CVV">

  <a href="confirmation.html">
    <button class="btn">Pay Now</button>
  </a>
</div>

</body>
</html>
